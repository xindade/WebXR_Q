<body>
  <canvas id="renderCanvas"></canvas>
  <div id="loading">Loading...</div>
  <button id="xr-button">进入 VR</button>

  <script>
    // ============================================================
    // 0. 全局常量与配置
    // ============================================================
    const SCENE_CONFIG = {
      platformRadius: 5,
      platformY: 0,
      pillarDistance: 5,
      pillarSize: { w: 0.3, d: 0.3, h: 4 },
      skyRadius: 35,
      rayLength: 10,
      colors: {
        grid: '#00ffff',
        gridAlt: '#0088ff',
        pillarEdge: '#00ff00',
        gunMuzzle: '#00ffff',
        panelBorder: '#888888'
      }
    };

    // ============================================================
    // 1. 音效与震动接口（预留钩子）

    /**
     * 手柄震动接口
     * @param {string} hand - "left" | "right"

    // ============================================================
    // 2. 程序化纹理工具
    // ============================================================

    const TextureUtils = {
      /** 生成平台网格纹理 (TRON风格) */
      createGridTexture(scene) {
        const size = 1024;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // 深灰基底
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, size, size);

        // 主网格线 - 青色
        ctx.strokeStyle = SCENE_CONFIG.colors.grid;
        ctx.lineWidth = 2;
        const step = size / 20;
        for (let i = 0; i <= size; i += step) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, size);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(size, i);
          ctx.stroke();
        }

        // 子网格线 - 暗青色
        ctx.strokeStyle = 'rgba(0, 136, 255, 0.3)';
        ctx.lineWidth = 1;
        const subStep = step / 4;
        for (let i = 0; i <= size; i += subStep) {
          if (i % step === 0) continue;
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, size);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(size, i);
          ctx.stroke();
        }

        const texture = new BABYLON.DynamicTexture('gridTex', size, scene, false);
        texture.update();
        const ctx2 = texture.getContext();
        ctx2.drawImage(canvas, 0, 0);
        texture.update();
        texture.wrapU = BABYLON.Texture.WRAP_ADDRESSMODE;
        texture.wrapV = BABYLON.Texture.WRAP_ADDRESSMODE;
        return texture;
      },

      /** 生成云海天空球纹理 */
      createCloudTexture(scene) {
        const w = 2048;
        const h = 1024;
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');

        // 上半部分：浅蓝到白渐变（天空）
        const skyGrad = ctx.createLinearGradient(0, 0, 0, h * 0.5);
        skyGrad.addColorStop(0, '#e0f0ff');
        skyGrad.addColorStop(1, '#ffffff');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, w, h * 0.5);

        // 下半部分：浓密云海
        const cloudGrad = ctx.createLinearGradient(0, h * 0.4, 0, h);
        cloudGrad.addColorStop(0, 'rgba(255,255,255,0.2)');
        cloudGrad.addColorStop(0.3, 'rgba(220,230,240,0.6)');
        cloudGrad.addColorStop(0.6, 'rgba(200,210,230,0.85)');
        cloudGrad.addColorStop(1, 'rgba(180,190,210,1)');
        ctx.fillStyle = cloudGrad;
        ctx.fillRect(0, h * 0.4, w, h * 0.6);

        // 绘制蓬松云朵（多个径向渐变）
        function drawCloud(cx, cy, r, alpha) {
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          g.addColorStop(0, `rgba(255,255,255,${alpha})`);
          g.addColorStop(0.5, `rgba(245,248,255,${alpha * 0.7})`);
          g.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
        }

        // 上半稀疏云
        for (let i = 0; i < 30; i++) {
          const x = Math.random() * w;
          const y = Math.random() * (h * 0.4);
          const r = 80 + Math.random() * 150;
          drawCloud(x, y, r, 0.4 + Math.random() * 0.3);
        }
        // 下半浓密云
        for (let i = 0; i < 60; i++) {
          const x = Math.random() * w;
          const y = h * 0.4 + Math.random() * (h * 0.6);
          const r = 100 + Math.random() * 200;
          drawCloud(x, y, r, 0.5 + Math.random() * 0.4);
        }

        const texture = new BABYLON.DynamicTexture('cloudTex', { width: w, height: h }, scene, false);
        const ctx2 = texture.getContext();
        ctx2.drawImage(canvas, 0, 0);
        texture.update();
        texture.wrapU = BABYLON.Texture.WRAP_ADDRESSMODE;
        texture.wrapV = BABYLON.Texture.WRAP_ADDRESSMODE;
        return texture;
      },

      /** 生成柱子流动光纹纹理 */
      createPillarFlowTexture(scene) {
        const w = 128;
        const h = 256;
        const texture = new BABYLON.DynamicTexture('pillarFlowTex', { width: w, height: h }, scene, true);
        const ctx = texture.getContext();

        // 深色底
        ctx.fillStyle = '#111111';
        ctx.fillRect(0, 0, w, h);

        // 垂直光条
        for (let i = 0; i < 6; i++) {
          const x = (w / 6) * i + (w / 12);
          const g = ctx.createLinearGradient(x - 8, 0, x + 8, 0);
          g.addColorStop(0, 'rgba(0,0,0,0)');
          g.addColorStop(0.5, `rgba(0,255,0,${0.3 + Math.random() * 0.3})`);
          g.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = g;
          ctx.fillRect(x - 8, 0, 16, h);
        }

        // 光点
        for (let i = 0; i < 20; i++) {
          const x = Math.random() * w;
          const y = Math.random() * h;
          const r = 2 + Math.random() * 4;
          const g = ctx.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0, 'rgba(0,255,0,0.6)');
          g.addColorStop(1, 'rgba(0,255,0,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        texture.update();
        texture.wrapU = BABYLON.Texture.WRAP_ADDRESSMODE;
        texture.wrapV = BABYLON.Texture.WRAP_ADDRESSMODE;
        return texture;
      },

      /** 生成心形图标纹理 */
      createHeartTexture(scene) {
        const size = 64;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        ctx.clearRect(0, 0, size, size);

        // 像素心形
        const heartPixels = [
          '001100011000',
          '011110111100',
          '111111111110',
          '111111111110',
          '111111111110',
          '011111111100',
          '001111111000',
          '000111110000',
          '000011100000',
          '000001000000'
        ];
        const pxSize = size / 12;
        ctx.fillStyle = '#ff3333';
        for (let row = 0; row < heartPixels.length; row++) {
          const line = heartPixels[row];
          for (let col = 0; col < line.length; col++) {
            if (line[col] === '1') {
              ctx.fillRect(col * pxSize + size / 2 - 6 * pxSize, row * pxSize + 8, pxSize, pxSize);
            }
          }
        }

        const texture = new BABYLON.DynamicTexture('heartTex', size, scene, false);
        const ctx2 = texture.getContext();
        ctx2.drawImage(canvas, 0, 0);
        texture.update();
        return texture;
      }
    };

    // ============================================================
    // 3. 状态机
    // ============================================================

    const GameState = {
      STATIC_DEMO: 'STATIC_DEMO',
      // 后续可扩展: PLAYING, PAUSED, GAME_OVER 等
    };

    class StateMachine {
      constructor() {
        this.state = GameState.STATIC_DEMO;
        this.listeners = {};
      }

      setState(newState) {
        const oldState = this.state;
        this.state = newState;
        this.emit('change', { oldState, newState });
        if (this.listeners[newState]) {
          this.listeners[newState].forEach(cb => cb(oldState, newState));
        }
      }

      getState() {
        return this.state;
      }

      on(state, callback) {
        if (!this.listeners[state]) this.listeners[state] = [];
        this.listeners[state].push(callback);
      }

      emit(event, data) {
        if (this.listeners[event]) {
          this.listeners[event].forEach(cb => cb(data));
        }
      }
    }

    // ============================================================
    // 4. EnvironmentManager - 环境管理
    // ============================================================

    class EnvironmentManager {
      constructor(scene) {
        this.scene = scene;
        this.pillars = [];
        this.pillarEdgeMeshes = [];
        this.pillarFlowTextures = [];
        this.time = 0;
      }

      /** 创建圆形平台 */
      createPlatform() {
        const { platformRadius } = SCENE_CONFIG;

        // 平台主体 - 低面数圆柱 (16 segments)
        const platform = BABYLON.MeshBuilder.CreateCylinder('platform', {
          diameter: platformRadius * 2,
          height: 0.2,
          tessellation: 32
        }, this.scene);
        platform.position.y = -0.1;
        platform.receiveShadows = true;

        const gridTex = TextureUtils.createGridTexture(this.scene);
        const platformMat = new BABYLON.StandardMaterial('platformMat', this.scene);
        platformMat.diffuseTexture = gridTex;
        platformMat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
        platform.material = platformMat;

        // 平台边缘发光环
        const edgeRing = BABYLON.MeshBuilder.CreateTorus('platformEdge', {
          diameter: platformRadius * 2,
          thickness: 0.05,
          tessellation: 48
        }, this.scene);
        edgeRing.position.y = 0;
        edgeRing.rotation.x = Math.PI / 2;

        const edgeMat = new BABYLON.StandardMaterial('platformEdgeMat', this.scene);
        edgeMat.emissiveColor = BABYLON.Color3.FromHexString(SCENE_CONFIG.colors.pillarEdge);
        edgeMat.disableLighting = true;
        edgeRing.material = edgeMat;

        this.platformEdgeMat = edgeMat;

        // 物理：平台地面（仅在物理引擎可用时创建）
        if (this.scene.physicsEngine && typeof CANNON !== 'undefined') {
          try {
            const groundShape = new CANNON.Box(new CANNON.Vec3(platformRadius, 0.1, platformRadius));
            const groundBody = new CANNON.Body({ mass: 0 });
            groundBody.addShape(groundShape);
            groundBody.position.set(0, -0.1, 0);
            this.scene.physicsEngine.addBody(groundBody);
          } catch (e) {
            console.warn('Platform physics body creation failed:', e);
          }
        }
      }

      /** 创建单根柱子 */
      createPillar(angleDeg) {
        const { pillarDistance, pillarSize } = SCENE_CONFIG;
        const angle = BABYLON.Tools.ToRadians(angleDeg);
        const cx = Math.cos(angle) * pillarDistance;
        const cz = Math.sin(angle) * pillarDistance;

        const rootName = `pillar_${angleDeg}`;

        // 柱子主体
        const pillar = BABYLON.MeshBuilder.CreateBox(rootName, {
          width: pillarSize.w,
          height: pillarSize.h,
          depth: pillarSize.d
        }, this.scene);
        pillar.position.set(cx, pillarSize.h / 2, cz);

        const pillarMat = new BABYLON.StandardMaterial(`${rootName}_mat`, this.scene);
        pillarMat.diffuseColor = new BABYLON.Color3(0.15, 0.15, 0.15);
        pillarMat.specularColor = new BABYLON.Color3(0.2, 0.2, 0.2);
        pillarMat.roughness = 0.8;
        pillar.material = pillarMat;

        // 流动光纹纹理
        const flowTex = TextureUtils.createPillarFlowTexture(this.scene);
        const flowMat = new BABYLON.StandardMaterial(`${rootName}_flowMat`, this.scene);
        flowMat.diffuseTexture = flowTex;
        flowMat.emissiveTexture = flowTex;
        flowMat.emissiveColor = BABYLON.Color3.FromHexString(SCENE_CONFIG.colors.pillarEdge);
        flowMat.opacityTexture = flowTex;
        flowMat.useAlphaFromDiffuseTexture = true;
        flowMat.disableLighting = true;

        // 在柱子表面贴一个略大的透明层来显示光纹
        const flowPlane = BABYLON.MeshBuilder.CreatePlane(`${rootName}_flow`, {
          width: pillarSize.w * 1.01,
          height: pillarSize.h
        }, this.scene);
        flowPlane.position.set(cx, pillarSize.h / 2, cz);
        flowPlane.material = flowMat;
        flowPlane.isVisible = false; // 用4个面的组合代替

        this.pillarFlowTextures.push({ texture: flowTex, material: flowMat, angle: angleDeg });

        // 柱子四条垂直边缘发光线
        const edgeOffsets = [
          { x: pillarSize.w / 2, z: pillarSize.d / 2 },
          { x: -pillarSize.w / 2, z: pillarSize.d / 2 },
          { x: pillarSize.w / 2, z: -pillarSize.d / 2 },
          { x: -pillarSize.w / 2, z: -pillarSize.d / 2 }
        ];

        const edgeMat = new BABYLON.StandardMaterial(`${rootName}_edgeMat`, this.scene);
        edgeMat.emissiveColor = BABYLON.Color3.FromHexString(SCENE_CONFIG.colors.pillarEdge);
        edgeMat.emissiveIntensity = 0.8;
        edgeMat.disableLighting = true;

        edgeOffsets.forEach((off, i) => {
          const edge = BABYLON.MeshBuilder.CreateBox(`${rootName}_edge_${i}`, {
            width: 0.02,
            height: pillarSize.h,
            depth: 0.02
          }, this.scene);
          edge.position.set(cx + off.x, pillarSize.h / 2, cz + off.z);
          edge.material = edgeMat;
          this.pillarEdgeMeshes.push(edge);
        });

        // 顶部和底部发光环
        [0, pillarSize.h].forEach((y, i) => {
          const ring = BABYLON.MeshBuilder.CreateTorus(`${rootName}_ring_${i}`, {
            diameter: Math.max(pillarSize.w, pillarSize.d) * 1.3,
            thickness: 0.03,
            tessellation: 16
          }, this.scene);
          ring.position.set(cx, y, cz);
          ring.rotation.x = Math.PI / 2;
          ring.material = edgeMat;
          this.pillarEdgeMeshes.push(ring);
        });

        this.pillars.push({
          mesh: pillar,
          edgeMat: edgeMat,
          baseAngle: angleDeg
        });
      }

      /** 创建所有柱子 */
      createPillars() {
        const angles = [0, 90, 180, 270];
        angles.forEach(a => this.createPillar(a));
      }

      /** 创建云海天空球 */
      createSky() {
        const { skyRadius } = SCENE_CONFIG;

        // 内天空球（从内部看）
        const sky = BABYLON.MeshBuilder.CreateSphere('sky', {
          diameter: skyRadius * 2,
          segments: 32,
          sideOrientation: BABYLON.Mesh.FRONTSIDE
        }, this.scene);
        sky.position.y = 0;
        sky.infiniteDistance = true;

        const cloudTex = TextureUtils.createCloudTexture(this.scene);
        const skyMat = new BABYLON.StandardMaterial('skyMat', this.scene);
        skyMat.diffuseTexture = cloudTex;
        skyMat.backFaceCulling = false;
        skyMat.disableLighting = true;
        sky.material = skyMat;

        // 底部云海平面（增强层次感）
        const cloudPlane = BABYLON.MeshBuilder.CreateGround('cloudPlane', {
          width: skyRadius * 2.5,
          height: skyRadius * 2.5,
          subdivisions: 2
        }, this.scene);
        cloudPlane.position.y = -2;

        const cloudPlaneMat = new BABYLON.StandardMaterial('cloudPlaneMat', this.scene);
        cloudPlaneMat.diffuseColor = new BABYLON.Color3(0.7, 0.75, 0.85);
        cloudPlaneMat.alpha = 0.6;
        cloudPlaneMat.backFaceCulling = false;
        cloudPlane.material = cloudPlaneMat;
      }

      /** 设置柱子边缘颜色（预留接口） */
      setPillarEdgeColor(hexColor) {
        const color = BABYLON.Color3.FromHexString(hexColor);
        this.pillars.forEach(p => {
          p.edgeMat.emissiveColor = color.clone();
        });
        this.pillarFlowTextures.forEach(ft => {
          ft.material.emissiveColor = color.clone();
        });
        if (this.platformEdgeMat) {
          this.platformEdgeMat.emissiveColor = color.clone();
        }
      }

      /** 更新动画 */
      update(deltaTime) {
        this.time += deltaTime;

        // 柱子光纹 UV 向上流动
        this.pillarFlowTextures.forEach((ft, idx) => {
          const vOffset = (this.time * 0.1 + idx * 0.25) % 1;
          ft.texture.vOffset = vOffset;
        });
      }

      /** 初始化环境 */
      init() {
        this.createPlatform();
        this.createPillars();
        this.createSky();
      }
    }

    // ============================================================
    // 5. UIManager - 左手腕面板
    // ============================================================

    class UIManager {
      constructor(scene) {
        this.scene = scene;
        this.panelMesh = null;
        this.adt = null;
      }

      /** 创建手腕面板 */
      createWristPanel(parentTransform) {
        // 底板几何体
        const panel = BABYLON.MeshBuilder.CreateBox('wristPanel', {
          width: 0.15,
          height: 0.005,
          depth: 0.08
        }, this.scene);

        // 材质
        const panelMat = new BABYLON.StandardMaterial('panelMat', this.scene);
        panelMat.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.1);
        panelMat.emissiveColor = new BABYLON.Color3(0.02, 0.02, 0.02);
        panel.material = panelMat;

        // 边框发光（略大的透明盒）
        const border = BABYLON.MeshBuilder.CreateBox('wristPanelBorder', {
          width: 0.155,
          height: 0.003,
          depth: 0.085
        }, this.scene);
        const borderMat = new BABYLON.StandardMaterial('borderMat', this.scene);
        borderMat.emissiveColor = BABYLON.Color3.FromHexString(SCENE_CONFIG.colors.panelBorder);
        borderMat.alpha = 0.5;
        borderMat.disableLighting = true;
        border.material = borderMat;
        border.parent = panel;

        // GUI 纹理
        this.adt = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(panel, 512, 256);

        // 背景
        const bg = new BABYLON.GUI.Rectangle();
        bg.width = '100%';
        bg.height = '100%';
        bg.color = '#555555';
        bg.thickness = 2;
        bg.background = 'rgba(0,0,0,0.7)';
        this.adt.addControl(bg);

        // 心形图标 + 血量
        const heartTex = TextureUtils.createHeartTexture(this.scene);
        const heartImage = new BABYLON.GUI.Image('heart', '');
        heartImage.source = heartTex.getContext().canvas.toDataURL();
        heartImage.width = '40px';
        heartImage.height = '40px';
        heartImage.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
        heartImage.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
        heartImage.left = '20px';
        heartImage.top = '10px';
        this.adt.addControl(heartImage);

        const hpText = new BABYLON.GUI.TextBlock();
        hpText.text = '100';
        hpText.color = '#ffffff';
        hpText.fontSize = 28;
        hpText.fontWeight = 'bold';
        hpText.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
        hpText.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
        hpText.left = '70px';
        hpText.top = '12px';
        this.adt.addControl(hpText);
        this.hpText = hpText;

        // 积分
        const scoreText = new BABYLON.GUI.TextBlock();
        scoreText.text = '$ 0';
        scoreText.color = '#ffff00';
        scoreText.fontSize = 28;
        scoreText.fontWeight = 'bold';
        scoreText.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_RIGHT;
        scoreText.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
        scoreText.left = '-20px';
        scoreText.top = '12px';
        this.adt.addControl(scoreText);
        this.scoreText = scoreText;

        // 技能冷却圆环
        const ringContainer = new BABYLON.GUI.Ellipse();
        ringContainer.width = '60px';
        ringContainer.height = '60px';
        ringContainer.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_CENTER;
        ringContainer.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_BOTTOM;
        ringContainer.top = '-10px';
        ringContainer.thickness = 4;
        ringContainer.color = '#666666';
        ringContainer.background = 'transparent';
        this.adt.addControl(ringContainer);
        this.cooldownRing = ringContainer;

        this.panelMesh = panel;
        this.parentTransform = parentTransform;

        // Billboard：始终面向玩家
        panel.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;

        return panel;
      }

      /** 更新面板位置（相对于左手） */
      update(leftController) {
        if (!this.panelMesh || !leftController) return;

        const pos = leftController.position.clone();
        const rot = leftController.rotationQuaternion || BABYLON.Quaternion.Identity();

        // 在左手腕上方偏移
        const offset = new BABYLON.Vector3(0, 0.08, 0);
        const worldOffset = offset.applyRotationQuaternion(rot);
        this.panelMesh.position = pos.add(worldOffset);
        this.panelMesh.rotationQuaternion = rot.clone();
      }

      /** 更新血量显示 */
      setHP(value) {
        if (this.hpText) this.hpText.text = String(value);
      }

      /** 更新积分显示 */
      setScore(value) {
        if (this.scoreText) this.scoreText.text = '$ ' + value;
      }

      /** 更新冷却环颜色（0~1） */
      setCooldown(percent) {
        if (!this.cooldownRing) return;
        // percent 1 = 就绪(绿色), 0 = 冷却中(灰色)
        const r = Math.floor((1 - percent) * 102);
        const g = Math.floor(percent * 255 + (1 - percent) * 102);
        const b = 102;
        this.cooldownRing.color = `rgb(${r},${g},${b})`;
      }
    }

    // ============================================================
    // 6. PlayerManager - 玩家双手与射线
    // ============================================================

    class PlayerManager {
      constructor(scene) {
        this.scene = scene;
        this.rightHand = null;
        this.leftHand = null;
        this.gunRay = null;
        this.gunMuzzle = null;
        this.muzzlePos = new BABYLON.Vector3();
      }

      /** 创建机械手模型 */
      createHandMesh(name, isRight) {
        const handRoot = new BABYLON.TransformNode(name + '_root', this.scene);

        // 手掌
        const palm = BABYLON.MeshBuilder.CreateBox(name + '_palm', {
          width: 0.06,
          height: 0.02,
          depth: 0.05
        }, this.scene);
        palm.parent = handRoot;
        palm.position.z = 0.02;

        // 手指（3个小方块抽象表示）
        for (let i = 0; i < 3; i++) {
          const finger = BABYLON.MeshBuilder.CreateBox(name + '_finger' + i, {
            width: 0.015,
            height: 0.015,
            depth: 0.03
          }, this.scene);
          finger.parent = handRoot;
          finger.position.set(-0.02 + i * 0.02, 0, 0.05);
        }

        const handMat = new BABYLON.StandardMaterial(name + '_mat', this.scene);
        handMat.diffuseColor = new BABYLON.Color3(0.4, 0.4, 0.45);
        handMat.specularColor = new BABYLON.Color3(0.3, 0.3, 0.3);
        palm.material = handMat;

        // 如果是右手，创建枪
        if (isRight) {
          this.createGun(handRoot, handMat);
        }

        return handRoot;
      }

      /** 创建几何风格枪械 */
      createGun(parent, sharedMat) {
        // 枪身主体
        const body = BABYLON.MeshBuilder.CreateBox('gun_body', {
          width: 0.03,
          height: 0.04,
          depth: 0.12
        }, this.scene);
        body.parent = parent;
        body.position.set(0, -0.02, 0.08);
        body.material = sharedMat;

        // 枪管
        const barrel = BABYLON.MeshBuilder.CreateBox('gun_barrel', {
          width: 0.015,
          height: 0.015,
          depth: 0.15
        }, this.scene);
        barrel.parent = parent;
        barrel.position.set(0, 0, 0.2);
        const barrelMat = new BABYLON.StandardMaterial('barrelMat', this.scene);
        barrelMat.diffuseColor = new BABYLON.Color3(0.2, 0.2, 0.25);
        barrel.material = barrelMat;

        // 枪口发光环
        const muzzle = BABYLON.MeshBuilder.CreateTorus('gun_muzzle', {
          diameter: 0.025,
          thickness: 0.005,
          tessellation: 12
        }, this.scene);
        muzzle.parent = parent;
        muzzle.position.set(0, 0, 0.28);
        const muzzleMat = new BABYLON.StandardMaterial('muzzleMat', this.scene);
        muzzleMat.emissiveColor = BABYLON.Color3.FromHexString(SCENE_CONFIG.colors.gunMuzzle);
        muzzleMat.disableLighting = true;
        muzzle.material = muzzleMat;
        this.gunMuzzle = muzzle;

        // 枪口世界位置计算用
        this.muzzleLocalPos = new BABYLON.Vector3(0, 0, 0.28);
      }

      /** 创建瞄准射线 */
      createGunRay() {
        const ray = BABYLON.MeshBuilder.CreateCylinder('gunRay', {
          height: SCENE_CONFIG.rayLength,
          diameter: 0.008,
          tessellation: 6
        }, this.scene);
        ray.rotation.x = Math.PI / 2;

        const rayMat = new BABYLON.StandardMaterial('rayMat', this.scene);
        rayMat.emissiveColor = BABYLON.Color3.FromHexString(SCENE_CONFIG.colors.gunMuzzle);
        rayMat.alpha = 0.4;
        rayMat.disableLighting = true;
        ray.material = rayMat;

        this.gunRay = ray;
      }

      /** 更新射线位置和长度 */
      updateGunRay(rightController) {
        if (!this.gunRay || !rightController || !this.rightHand) return;

        const pos = rightController.position.clone();
        const rot = rightController.rotationQuaternion || BABYLON.Quaternion.Identity();

        // 枪口世界位置
        const muzzleOffset = this.muzzleLocalPos.clone();
        const worldMuzzle = muzzleOffset.applyRotationQuaternion(rot).add(pos);

        // 射线方向（枪的朝向 = 手柄Z轴）
        const forward = new BABYLON.Vector3(0, 0, 1).applyRotationQuaternion(rot);

        // 射线检测
        const ray = new BABYLON.Ray(worldMuzzle, forward, SCENE_CONFIG.rayLength);
        const hit = this.scene.pickWithRay(ray, (mesh) => {
          return mesh.name.startsWith('pillar') || mesh.name === 'platform';
        });

        const length = hit.hit && hit.distance < SCENE_CONFIG.rayLength
          ? hit.distance
          : SCENE_CONFIG.rayLength;

        // 更新射线网格
        this.gunRay.scaling.y = length / SCENE_CONFIG.rayLength;
        this.gunRay.position = worldMuzzle.add(forward.scale(length / 2));
        this.gunRay.rotationQuaternion = rot.clone();
        // 圆柱默认朝上，需要额外旋转90度绕X轴
        const q = BABYLON.Quaternion.FromEulerAngles(Math.PI / 2, 0, 0);
        this.gunRay.rotationQuaternion = rot.multiply(q);
      }

      /** 初始化玩家 */
      init(xrHelper) {
        this.rightHand = this.createHandMesh('rightHand', true);
        this.leftHand = this.createHandMesh('leftHand', false);
        this.createGunRay();

        // 监听手柄输入
        xrHelper.input.onControllerAddedObservable.add((controller) => {
          if (controller.inputSource.handedness === 'right') {
            this._rightController = controller;
            controller.onMeshLoadedObservable.add(() => {
              // 隐藏原始手柄模型，使用自定义
              if (controller.mesh) controller.mesh.isVisible = false;
            });
          } else if (controller.inputSource.handedness === 'left') {
            this._leftController = controller;
            controller.onMeshLoadedObservable.add(() => {
              if (controller.mesh) controller.mesh.isVisible = false;
            });
          }
        });
      }

      get rightController() { return this._rightController; }
      get leftController() { return this._leftController; }

      /** 每帧更新 */
      update() {
        if (this._rightController) {
          const pos = this._rightController.position;
          const rot = this._rightController.rotationQuaternion || BABYLON.Quaternion.Identity();
          this.rightHand.position = pos.clone();
          this.rightHand.rotationQuaternion = rot.clone();
          this.updateGunRay(this._rightController);
        }
        if (this._leftController) {
          const pos = this._leftController.position;
          const rot = this._leftController.rotationQuaternion || BABYLON.Quaternion.Identity();
          this.leftHand.position = pos.clone();
          this.leftHand.rotationQuaternion = rot.clone();
        }
      }
    }

    // ============================================================
    // 7. SceneManager - 场景总控
    // ============================================================

    class SceneManager {
      constructor(engine, canvas) {
        this.engine = engine;
        this.canvas = canvas;
        this.scene = null;
        this.stateMachine = new StateMachine();
        this.envManager = null;
        this.playerManager = null;
        this.uiManager = null;
        this.xrHelper = null;
      }

      async init() {
        this.scene = new BABYLON.Scene(this.engine);

        // 启用物理引擎 (Cannon.js) — 失败则优雅降级
        try {
          if (typeof CANNON !== 'undefined') {
            const cannonPlugin = new BABYLON.CannonJSPlugin(true, 10, CANNON);
            this.scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), cannonPlugin);
          } else {
            console.warn('Cannon.js not loaded, running without physics');
          }
        } catch (e) {
          console.warn('Physics init failed:', e);
        }

        // 相机
        const camera = new BABYLON.FreeCamera('camera', new BABYLON.Vector3(0, 1.6, 0), this.scene);
        camera.attachControl(this.canvas, true);

        // 光照
        this.setupLighting();

        // 环境
        this.envManager = new EnvironmentManager(this.scene);
        this.envManager.init();

        // 玩家
        this.playerManager = new PlayerManager(this.scene);

        // UI（先创建，位置在update中同步）
        this.uiManager = new UIManager(this.scene);
        const dummyNode = new BABYLON.TransformNode('uiAnchor', this.scene);
        this.uiManager.createWristPanel(dummyNode);

        // WebXR
        await this.setupWebXR();

        // 渲染循环
        this.engine.runRenderLoop(() => {
          const dt = this.engine.getDeltaTime() / 1000;
          this.update(dt);
          this.scene.render();
        });
      }

      setupLighting() {
        // 环境光
        const hemiLight = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), this.scene);
        hemiLight.intensity = 0.3;
        hemiLight.diffuse = new BABYLON.Color3(0.9, 0.9, 0.95);
        hemiLight.groundColor = new BABYLON.Color3(0.2, 0.2, 0.25);

        // 平行光（从上方偏后）
        const dirLight = new BABYLON.DirectionalLight('dir', new BABYLON.Vector3(0.2, -1, 0.5), this.scene);
        dirLight.intensity = 0.6;
        dirLight.diffuse = new BABYLON.Color3(0.95, 0.95, 1.0);
      }

      async setupWebXR() {
        try {
          const xr = await this.scene.createDefaultXRExperienceAsync({
            floorMeshes: [],
            uiOptions: {
              sessionMode: 'immersive-vr',
              referenceSpaceType: 'local-floor'
            },
            optionalFeatures: ['hand-tracking']
          });

          this.xrHelper = xr;
          this.playerManager.init(xr);

          // UI按钮
          const btn = document.getElementById('xr-button');
          btn.style.display = 'block';
          btn.addEventListener('click', () => {
            xr.enterAsync();
          });

          // 进入VR后调整相机高度
          xr.baseExperience.onStateChangedObservable.add((state) => {
            if (state === BABYLON.WebXRState.IN_XR) {
              // 站立高度已在 referenceSpaceType: 'local-floor' 中处理
            }
          });

        } catch (e) {
          console.warn('WebXR not available:', e);
          document.getElementById('xr-button').style.display = 'none';
        }
      }

      update(dt) {
        this.envManager.update(dt);
        this.playerManager.update();

        // 更新手腕UI位置
        const leftCtrl = this.playerManager.leftController;
        if (leftCtrl) {
          this.uiManager.update(leftCtrl);
        }
      }
    }

    // ============================================================
    // 8. 主入口
    // ============================================================

    async function init() {
      const canvas = document.getElementById('renderCanvas');
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer: true,
        stencil: true,
        antialias: true
      });

      // 窗口大小调整
      window.addEventListener('resize', () => engine.resize());

      const sceneManager = new SceneManager(engine, canvas);
      await sceneManager.init();

      document.getElementById('loading').style.display = 'none';

      // 保留全局引用以便调试
      window.sceneManager = sceneManager;
    }

    // 启动
    init().catch(err => {
      console.error('Init failed:', err);
      document.getElementById('loading').textContent = 'Error: ' + err.message;
    });
  </script>
</body>
