<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebXR Stone Tower - 石头高塔</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #renderCanvas { width: 100%; height: 100%; touch-action: none; display: block; }

    /* ---- 全屏调试层：始终在最前，VR里可见 ---- */
    #debugLog {
      position: fixed; top: 0; left: 0; width: 100%; min-height: 52px;
      background: rgba(0,0,0,0.94); color: #88ffcc;
      font-family: 'Courier New', monospace; font-size: 0.78rem;
      padding: 6px 12px; z-index: 9999; max-height: 120px; overflow-y: auto;
      border-bottom: 1px solid #00ffcc; line-height: 1.7; display: block;
    }
    #statusBar {
      position: fixed; bottom: 0; left: 0; width: 100%;
      text-align: center; font-size: 1rem; color: #88ffcc;
      font-family: 'Courier New', monospace; z-index: 9998;
      pointer-events: none; letter-spacing: 1px;
      text-shadow: 0 0 12px #00ffcc;
      background: rgba(0,0,0,0.7); padding: 10px 0;
      border-top: 1px solid rgba(0,255,204,0.3);
    }
    #diagOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.90); z-index: 9997;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Courier New', monospace; color: #88ffcc;
    }
    #diagOverlay.show { display: flex; }
    #diagMsg {
      font-size: 1.1rem; text-align: center; padding: 24px 32px;
      background: rgba(0,20,15,0.9); border: 2px solid #00ffcc;
      max-width: 600px; white-space: pre-wrap; line-height: 1.7;
    }
    #diagOverlay small { margin-top: 16px; font-size: 0.75rem; color: #555; }

    /* ---- 主界面遮罩 ---- */
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.75);
      font-family: 'Courier New', monospace; color: #00ffcc;
      z-index: 100; pointer-events: all;
    }
    #overlay h1 { font-size: 2rem; letter-spacing: 4px; text-shadow: 0 0 20px #00ffcc; margin-bottom: 8px; }
    #overlay h2 { font-size: 1rem; color: #88ffdd; letter-spacing: 2px; margin-bottom: 24px; }
    #overlay p  { font-size: 0.85rem; color: #aaa; margin: 4px 0; text-align: center; max-width: 600px; line-height: 1.6; }
    #overlay .warn { color: #ffaa00; font-size: 0.8rem; margin-top: 16px; }

    #startBtn {
      margin-top: 24px; padding: 12px 36px;
      background: transparent; border: 2px solid #00ffcc;
      color: #00ffcc; font-family: 'Courier New', monospace; font-size: 1rem;
      letter-spacing: 3px; cursor: pointer;
      box-shadow: 0 0 15px rgba(0,255,204,0.3);
      transition: all 0.2s;
    }
    #startBtn:hover { background: rgba(0,255,204,0.15); box-shadow: 0 0 25px rgba(0,255,204,0.6); }
    #startBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<canvas id="renderCanvas"></canvas>

<!-- 全屏调试层：始终在最前，VR里可见 -->
<div id="debugLog"></div>
<div id="statusBar">初始化中...</div>
<div id="diagOverlay">
  <div id="diagMsg"></div>
  <small>点击任意处关闭</small>
</div>

<!-- 主界面遮罩 -->
<div id="overlay">
  <h1>STONE TOWER</h1>
  <h2>WebXR Static Test Scene &middot; Babylon.js 7.x</h2>
  <p>8层石塔 &middot; 4柱支撑 &middot; 蓝天白云 &middot; B键传送上升</p>
  <p style="margin-top:12px; color:#88ffcc;">白云密度随楼层高度增加</p>
  <p class="warn">&#9651; 请使用 HTTPS 或 localhost 访问本页面以启用 WebXR</p>
  <button id="startBtn">ENTER VR</button>
</div>

<!-- Babylon.js Core -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<!-- Babylon.js Loaders -->
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>

<script>
'use strict';

// ================================================================
// 全局错误捕获
// ================================================================
window.addEventListener('error', (e) => {
  const msg = '[JS ERROR] ' + (e.message || '') + ' @ ' + (e.filename||'').split('/').pop() + ':' + (e.lineno||'');
  showDiag('[JS ERROR]\n' + msg);
});
window.addEventListener('unhandledrejection', (e) => {
  showDiag('[UNHANDLED]\n' + String(e.reason));
});

// ================================================================
// 调试日志系统
// ================================================================
function addLog(msg) {
  var d = document.getElementById('debugLog');
  if (d) {
    var t = new Date().toLocaleTimeString();
    var div = document.createElement('div');
    div.textContent = '[' + t + '] ' + msg;
    d.insertBefore(div, d.firstChild);
    if (d.innerHTML.length > 3000) d.innerHTML = d.innerHTML.substring(0, 3000);
  }
}
function setStatus(msg) {
  var el = document.getElementById('statusBar');
  if (el) el.textContent = msg;
  addLog(msg);
  console.log('[STATUS]', msg);
}
function showDiag(msg) {
  var ds = document.getElementById('diagMsg');
  var dv = document.getElementById('diagOverlay');
  if (ds && dv) { ds.textContent = msg; dv.className = 'show'; }
  console.error('[DIAG]', msg);
}
window.showDiag = showDiag; // 全局暴露

// 点击关闭诊断弹窗
document.getElementById('diagOverlay').addEventListener('click', function() {
  this.className = '';
});

// ================================================================
// 音效接口 (SFX Hook)
// ================================================================
function playSFX(eventName) {

}

// ================================================================
// 震动接口
// ================================================================
function vibrateController(hand, intensity, duration) {
  // TODO: Implement haptic feedback via XRController.gamepad hapticActuators
}

// ================================================================
// 场景状态枚举
// ================================================================
var SCENE_STATE = {
  IDLE:       'IDLE',
  STATIC_DEMO:'STATIC_DEMO',
  GAMEPLAY:   'GAMEPLAY',
};

// ================================================================
// Helpers
// ================================================================
function hexToColor3(hex) {
  var r = parseInt(hex.slice(1,3), 16) / 255;
  var g = parseInt(hex.slice(3,5), 16) / 255;
  var b = parseInt(hex.slice(5,7), 16) / 255;
  return new BABYLON.Color3(r, g, b);
}

// ================================================================
// 纹理生成函数
// ================================================================

// 程序化石头纹理
function createStoneTexture(scene) {
  var W = 512, H = 512;
  var canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  var ctx = canvas.getContext('2d');
  
  // 基础石灰色
  ctx.fillStyle = '#8a8178';
  ctx.fillRect(0, 0, W, H);
  
  // 添加石头纹理 - 随机深浅不一的石块
  for (var i = 0; i < 20; i++) {
    var x = Math.random() * W;
    var y = Math.random() * H;
    var w = 40 + Math.random() * 100;
    var h = 30 + Math.random() * 80;
    
    var shade = Math.floor(Math.random() * 40 - 20);
    var r = 138 + shade;
    var g = 129 + shade;
    var b = 120 + shade;
    ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    ctx.fillRect(x, y, w, h);
    
    // 石块边缘阴影
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
  }
  
  // 添加裂纹
  ctx.strokeStyle = 'rgba(50,45,40,0.4)';
  ctx.lineWidth = 1;
  for (var i = 0; i < 15; i++) {
    ctx.beginPath();
    var x = Math.random() * W;
    var y = Math.random() * H;
    ctx.moveTo(x, y);
    for (var j = 0; j < 5; j++) {
      x += (Math.random() - 0.5) * 60;
      y += (Math.random() - 0.5) * 40;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  
  var tex = new BABYLON.DynamicTexture('stoneTex', {width:W, height:H}, scene, false);
  tex.getContext().drawImage(canvas, 0, 0);
  tex.update();
  tex.uScale = 2; tex.vScale = 4;
  return tex;
}

// 蓝天白云纹理 - 支持白云密度参数
function createBlueSkyTexture(scene, cloudDensity) {
  var W = 1024, H = 512;
  var canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  var ctx = canvas.getContext('2d');
  
  // 渐变蓝天
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#3d7ec9');     // 顶部深蓝
  grad.addColorStop(0.3, '#5ba3e0');   // 中间天蓝
  grad.addColorStop(0.6, '#87ceeb');   // 中下部
  grad.addColorStop(1, '#c8e6f5');     // 地平线浅蓝
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  // 白云密度：每层基础8朵，密度0-1对应0-50朵
  var baseClouds = Math.floor(8 + cloudDensity * 42);
  
  // 绘制白云朵
  for (var i = 0; i < baseClouds; i++) {
    var x = Math.random() * W;
    // 白云主要分布在天空上半部分
    var y = 30 + Math.random() * (H * 0.7);
    var rx = 50 + Math.random() * 100;
    var ry = 25 + Math.random() * 50;
    
    // 绘制云朵主体 - 多个椭圆叠加
    ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
    
    // 主椭圆
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 叠层1
    ctx.beginPath();
    ctx.ellipse(x - rx * 0.35, y - ry * 0.4, rx * 0.65, ry * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 叠层2
    ctx.beginPath();
    ctx.ellipse(x + rx * 0.4, y - ry * 0.3, rx * 0.55, ry * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 叠层3（顶部小圆）
    ctx.beginPath();
    ctx.ellipse(x - rx * 0.1, y - ry * 0.7, rx * 0.4, ry * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  var tex = new BABYLON.DynamicTexture('blueSkyTex_' + cloudDensity.toFixed(1), {width:W, height:H}, scene, false);
  tex.getContext().drawImage(canvas, 0, 0);
  tex.update();
  tex.uScale = 2; tex.vScale = 1;
  return tex;
}

// 白云球体 - 用于层间白云装饰
function createCloudMesh(scene, position, scale) {
  var cloudRoot = new BABYLON.TransformNode('cloud_' + Math.random(), scene);
  cloudRoot.position = position;
  
  var cloudMat = new BABYLON.StandardMaterial('cloudMat', scene);
  cloudMat.diffuseColor = new BABYLON.Color3(1, 1, 1);
  cloudMat.emissiveColor = new BABYLON.Color3(0.95, 0.95, 0.95);
  cloudMat.alpha = 0.85;
  cloudMat.backFaceCulling = false;
  
  // 创建多朵云的组合
  var offsets = [
    {x: 0, y: 0, z: 0, rx: 1.2, rz: 0.6},
    {x: 1.0, y: -0.3, z: 0.2, rx: 0.8, rz: 0.5},
    {x: -0.9, y: -0.2, z: -0.1, rx: 0.9, rz: 0.5},
    {x: 0.3, y: 0.4, z: 0.3, rx: 0.6, rz: 0.4},
  ];
  
  offsets.forEach(function(offset, idx) {
    var sphere = BABYLON.MeshBuilder.CreateSphere('cloudPart_' + idx, {diameter: 1.2 * scale, segments: 8}, scene);
    sphere.position.set(offset.x * scale, offset.y * scale, offset.z * scale);
    sphere.scaling.set(offset.rx, 0.6, offset.rz);
    sphere.material = cloudMat;
    sphere.parent = cloudRoot;
  });
  
  return cloudRoot;
}

// ================================================================
// EnvironmentManager
// ================================================================
var EnvironmentManager = (function() {
  function EnvironmentManager(scene) {
    this.scene = scene;
    this.currentFloor = 1;       // 当前楼层 1-8
    this.totalFloors = 8;        // 总楼层
    this.floorHeight = 3.0;      // 每层高度
    this.floorRadius = 3.0;      // 楼层半径
    this.pillarRadius = 0.4;     // 柱子半径
    this.clouds = [];            // 层间白云
    this.teleporters = [];       // 传送石板
    this.time = 0;
    this._build();
  }

  EnvironmentManager.prototype._build = function() {
    var scene = this.scene;
    var self = this;
    var stoneTex = createStoneTexture(scene);
    
    // 创建8层高塔
    for (var floor = 1; floor <= this.totalFloors; floor++) {
      var floorY = (floor - 1) * this.floorHeight + 0.1; // 层底高度
      var floorYCenter = floorY + this.floorHeight / 2;
      
      // 计算该层白云密度：第1层0.1，第8层1.0
      var cloudDensity = 0.1 + (floor - 1) / (this.totalFloors - 1) * 0.9;
      
      // 每层楼板（圆形石板）
      var floorSlab = BABYLON.MeshBuilder.CreateCylinder('floor_' + floor, {
        diameter: this.floorRadius * 2,
        height: 0.3,
        tessellation: 32,
      }, scene);
      floorSlab.position.y = floorY + 0.15;
      var slabMat = new BABYLON.StandardMaterial('slabMat_' + floor, scene);
      slabMat.diffuseTexture = stoneTex;
      slabMat.specularColor = new BABYLON.Color3(0.12, 0.12, 0.12);
      slabMat.specularPower = 4;
      floorSlab.material = slabMat;
      
      // 4根支撑柱 - 均匀分布在圆周上
      var pillarAngles = [0, 90, 180, 270];
      pillarAngles.forEach(function(angle, idx) {
        var rad = (angle * Math.PI) / 180;
        var px = Math.sin(rad) * (this.floorRadius - 0.2);
        var pz = Math.cos(rad) * (this.floorRadius - 0.2);
        
        // 柱子（圆柱）
        var pillar = BABYLON.MeshBuilder.CreateCylinder('pillar_' + floor + '_' + idx, {
          diameter: this.pillarRadius * 2,
          height: this.floorHeight,
          tessellation: 12,
        }, scene);
        pillar.position.set(px, floorYCenter, pz);
        
        var pillarMat = new BABYLON.StandardMaterial('pillarMat_' + floor + '_' + idx, scene);
        pillarMat.diffuseTexture = stoneTex;
        pillarMat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
        pillarMat.specularPower = 6;
        pillar.material = pillarMat;
        
        // 柱子顶部装饰环
        var ring = BABYLON.MeshBuilder.CreateTorus('pillarRing_' + floor + '_' + idx, {
          diameter: this.pillarRadius * 2.4,
          thickness: 0.08,
          tessellation: 16,
        }, scene);
        ring.position.set(px, floorY + this.floorHeight, pz);
        var ringMat = new BABYLON.StandardMaterial('pillarRingMat', scene);
        ringMat.diffuseColor = new BABYLON.Color3(0.5, 0.48, 0.45);
        ringMat.specularColor = new BABYLON.Color3(0.2, 0.2, 0.2);
        ring.material = ringMat;
      }.bind(this));
      
      // 中央传送石板（第1-7层有，第8层顶部没有）
      if (floor < this.totalFloors) {
        var teleporter = BABYLON.MeshBuilder.CreateCylinder('teleporter_' + floor, {
          diameter: 1.2,
          height: 0.15,
          tessellation: 32,
        }, scene);
        teleporter.position.y = floorY + this.floorHeight - 0.05;
        
        var teleporterMat = new BABYLON.StandardMaterial('teleporterMat_' + floor, scene);
        teleporterMat.diffuseColor = new BABYLON.Color3(0.6, 0.7, 0.8);
        teleporterMat.emissiveColor = new BABYLON.Color3(0.1, 0.15, 0.2);
        teleporterMat.specularColor = new BABYLON.Color3(0.4, 0.4, 0.4);
        teleporter.material = teleporterMat;
        
        this.teleporters.push({
          mesh: teleporter,
          fromFloor: floor,
          toFloor: floor + 1,
          material: teleporterMat
        });
        
        // 传送石板边缘发光环
        var glowRing = BABYLON.MeshBuilder.CreateTorus('glowRing_' + floor, {
          diameter: 1.3,
          thickness: 0.05,
          tessellation: 32,
        }, scene);
        glowRing.position.y = floorY + this.floorHeight - 0.02;
        var glowMat = new BABYLON.StandardMaterial('glowMat_' + floor, scene);
        glowMat.emissiveColor = new BABYLON.Color3(0.0, 0.5, 1.0);
        glowMat.disableLighting = true;
        glowRing.material = glowMat;
        
        // 添加向上箭头指示
        var arrow = BABYLON.MeshBuilder.CreateCylinder('arrow_' + floor, {
          diameterTop: 0,
          diameterBottom: 0.4,
          height: 0.5,
          tessellation: 4,
        }, scene);
        arrow.position.y = floorY + this.floorHeight + 0.4;
        var arrowMat = new BABYLON.StandardMaterial('arrowMat_' + floor, scene);
        arrowMat.diffuseColor = new BABYLON.Color3(0.3, 0.5, 0.7);
        arrowMat.emissiveColor = new BABYLON.Color3(0.0, 0.3, 0.6);
        arrow.material = arrowMat;
      }
      
      // 层间白云（第2-8层之间）
      if (floor > 1) {
        var numClouds = Math.floor(2 + cloudDensity * 4); // 2-6朵云
        for (var c = 0; c < numClouds; c++) {
          var cloudAngle = Math.random() * Math.PI * 2;
          var cloudDist = 3 + Math.random() * 5;
          var cloudX = Math.sin(cloudAngle) * cloudDist;
          var cloudZ = Math.cos(cloudAngle) * cloudDist;
          var cloudY = floorY + this.floorHeight * 0.3 + Math.random() * this.floorHeight * 0.4;
          var cloudScale = 1.5 + Math.random() * 1.5;
          
          var cloud = createCloudMesh(scene, new BABYLON.Vector3(cloudX, cloudY, cloudZ), cloudScale);
          this.clouds.push(cloud);
        }
      }
    }
    
    // 底部地基
    var base = BABYLON.MeshBuilder.CreateCylinder('towerBase', {
      diameter: this.floorRadius * 2.2,
      height: 0.5,
      tessellation: 32,
    }, scene);
    base.position.y = -0.25;
    var baseMat = new BABYLON.StandardMaterial('baseMat', scene);
    baseMat.diffuseTexture = stoneTex;
    baseMat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
    base.material = baseMat;

    // 天空球
    var sky = BABYLON.MeshBuilder.CreateSphere('sky', {
      diameter: 120,
      segments: 32,
      sideOrientation: BABYLON.Mesh.BACKSIDE,
    }, scene);
    sky.position.y = -20;
    
    // 初始白云密度设为中等（第一层视角）
    var skyMat = new BABYLON.StandardMaterial('skyMat', scene);
    var blueSkyTex = createBlueSkyTexture(scene, 0.3);
    skyMat.diffuseTexture = blueSkyTex;
    skyMat.emissiveTexture = blueSkyTex;
    skyMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
    skyMat.backFaceCulling = false;
    skyMat.disableLighting = true;
    sky.material = skyMat;
    this.skyMesh = sky;
    this.skyMaterial = skyMat;
    this.skyTexture = blueSkyTex;

    // 太阳
    var sun = BABYLON.MeshBuilder.CreateSphere('sun', {
      diameter: 5,
      segments: 16,
    }, scene);
    sun.position.set(40, 50, -60);
    var sunMat = new BABYLON.StandardMaterial('sunMat', scene);
    sunMat.emissiveColor = new BABYLON.Color3(1, 0.98, 0.8);
    sunMat.disableLighting = true;
    sun.material = sunMat;

    // 光照
    var ambient = new BABYLON.HemisphericLight('ambient', new BABYLON.Vector3(0, 1, 0), scene);
    ambient.intensity = 0.6;
    ambient.diffuse = new BABYLON.Color3(0.9, 0.92, 1.0);
    ambient.groundColor = new BABYLON.Color3(0.6, 0.65, 0.7);

    var sunLight = new BABYLON.DirectionalLight('sunLight', new BABYLON.Vector3(-0.5, -1, 0.3), scene);
    sunLight.intensity = 0.8;
    sunLight.diffuse = new BABYLON.Color3(1.0, 0.97, 0.9);
  };

  // 传送功能：切换到指定楼层
  EnvironmentManager.prototype.teleportToFloor = function(targetFloor) {
    if (targetFloor < 1 || targetFloor > this.totalFloors) {
      addLog('[传送] 无效楼层: ' + targetFloor);
      return false;
    }
    
    var targetY = (targetFloor - 1) * this.floorHeight + 1.6; // 玩家眼睛高度
    this.currentFloor = targetFloor;
    addLog('[传送] 传送到第 ' + targetFloor + ' 层 (y=' + targetY.toFixed(1) + ')');
    
    // 更新天空白云密度
    var cloudDensity = 0.1 + (targetFloor - 1) / (this.totalFloors - 1) * 0.9;
    if (this.skyMaterial && this.skyTexture) {
      var newTex = createBlueSkyTexture(this.scene, cloudDensity);
      this.skyMaterial.diffuseTexture = newTex;
      this.skyMaterial.emissiveTexture = newTex;
      this.skyTexture = newTex;
      addLog('[云层] 密度: ' + (cloudDensity * 100).toFixed(0) + '%');
    }
    
    // 返回目标Y坐标，让 PlayerManager 处理实际移动
    return targetY;
  };

  // 获取当前楼层
  EnvironmentManager.prototype.getCurrentFloor = function() {
    return this.currentFloor;
  };

  // 获取楼层Y坐标
  EnvironmentManager.prototype.getFloorY = function(floor) {
    return (floor - 1) * this.floorHeight;
  };

  // 预留：塔的特效控制
  EnvironmentManager.prototype.setTowerGlow = function(colorHex, intensity) {
    // 石头塔不发光的特性
  };

  EnvironmentManager.prototype.update = function(deltaTime) {
    this.time += deltaTime;
    
    // 传送石板动画
    this.teleporters.forEach(function(tp, idx) {
      tp.material.emissiveColor = new BABYLON.Color3(
        0.1 + Math.sin(this.time * 2 + idx) * 0.1,
        0.15 + Math.sin(this.time * 2 + idx) * 0.1,
        0.2 + Math.sin(this.time * 2 + idx) * 0.15
      );
    }.bind(this));
    
    // 白云漂浮动画
    this.clouds.forEach(function(cloud, idx) {
      cloud.position.x += Math.sin(this.time * 0.3 + idx) * 0.002;
      cloud.position.z += Math.cos(this.time * 0.2 + idx) * 0.001;
    }.bind(this));
  };

  return EnvironmentManager;
})();

// ================================================================
// PlayerManager
// ================================================================
var PlayerManager = (function() {
  function PlayerManager(scene, xrHelper) {
    this.scene = scene;
    this.xrHelper = xrHelper;
    this.rightHand = null;
    this.leftHand  = null;
    this.gun       = null;
    this.gunTip    = null;
    this._build();
  }

  PlayerManager.prototype._build = function() {
    var scene = this.scene;
    var self = this;

    // 几何手套工厂
    var makeGlove = function(name) {
      var root = new BABYLON.TransformNode(name, scene);
      var gloveMat = new BABYLON.StandardMaterial(name+'_mat', scene);
      gloveMat.diffuseColor  = new BABYLON.Color3(0.25, 0.25, 0.28);
      gloveMat.specularColor = new BABYLON.Color3(0.4, 0.4, 0.4);
      gloveMat.specularPower = 32;

      var palm = BABYLON.MeshBuilder.CreateBox(name+'_palm', {width:0.07,height:0.04,depth:0.09}, scene);
      palm.material = gloveMat; palm.parent = root;

      var fingerOffsets = [-0.028, -0.009, 0.009, 0.028];
      fingerOffsets.forEach(function(ox, fi) {
        var seg1 = BABYLON.MeshBuilder.CreateBox(name+'_f'+fi, {width:0.018,height:0.038,depth:0.018}, scene);
        seg1.position.set(ox, -0.04, 0.0); seg1.material = gloveMat; seg1.parent = root;
        var seg2 = BABYLON.MeshBuilder.CreateBox(name+'_ft'+fi, {width:0.015,height:0.03,depth:0.015}, scene);
        seg2.position.set(ox, -0.075, 0.0); seg2.material = gloveMat; seg2.parent = root;
      });
      var thumb = BABYLON.MeshBuilder.CreateBox(name+'_thumb',{width:0.02,height:0.03,depth:0.015}, scene);
      thumb.position.set(0.045, -0.015, 0.02); thumb.rotation.z = -0.5;
      thumb.material = gloveMat; thumb.parent = root;
      return root;
    };

    // 枪械工厂
    var makeGun = function() {
      var gunRoot = new BABYLON.TransformNode('gunRoot', scene);
      var metalMat = new BABYLON.StandardMaterial('gunMetalMat', scene);
      metalMat.diffuseColor  = new BABYLON.Color3(0.15, 0.15, 0.18);
      metalMat.specularColor = new BABYLON.Color3(0.6, 0.6, 0.6);
      metalMat.specularPower = 64;

      var body = BABYLON.MeshBuilder.CreateBox('gunBody',{width:0.04,height:0.06,depth:0.22}, scene);
      body.position.set(0, -0.02, -0.02); body.material = metalMat; body.parent = gunRoot;

      var barrel = BABYLON.MeshBuilder.CreateCylinder('barrel',{diameter:0.025,height:0.18,tessellation:12}, scene);
      barrel.rotation.x = Math.PI/2;
      barrel.position.set(0, -0.01, 0.11);
      barrel.material = metalMat; barrel.parent = gunRoot;

      var tipRing = BABYLON.MeshBuilder.CreateTorus('tipRing',{diameter:0.035,thickness:0.006,tessellation:16}, scene);
      tipRing.rotation.x = Math.PI/2;
      tipRing.position.set(0, -0.01, 0.20);
      var tipMat = new BABYLON.StandardMaterial('tipMat', scene);
      tipMat.emissiveColor = hexToColor3('#00ffcc');
      tipMat.disableLighting = true;
      tipRing.material = tipMat; tipRing.parent = gunRoot;

      var guard = BABYLON.MeshBuilder.CreateBox('guard',{width:0.05,height:0.01,depth:0.04}, scene);
      guard.position.set(0, -0.06, -0.05); guard.material = metalMat; guard.parent = gunRoot;

      var tipGlow = BABYLON.MeshBuilder.CreateSphere('tipGlow',{diameter:0.012,segments:6}, scene);
      tipGlow.position.set(0, -0.01, 0.21);
      var glowMat = new BABYLON.StandardMaterial('glowMat', scene);
      glowMat.emissiveColor = hexToColor3('#00ffcc');
      glowMat.disableLighting = true;
      tipGlow.material = glowMat; tipGlow.parent = gunRoot;

      return { root: gunRoot, tip: tipGlow };
    };

    this.leftHand  = makeGlove('leftGlove');
    this.rightHand = makeGlove('rightGlove');

    var gunInfo = makeGun();
    this.gun    = gunInfo.root;
    this.gunTip = gunInfo.tip;

    this.gun.parent = this.rightHand;
    this.gun.position.set(0, -0.05, 0.08);

    // 枪射线
    var ray = BABYLON.MeshBuilder.CreateCylinder('aimRay',{
      diameterTop:0.002, diameterBottom:0.006, height:10, tessellation:6,
    }, scene);
    ray.rotation.x = Math.PI/2;
    ray.position.set(0, -0.01, 0.21 + 5);
    var rayMat = new BABYLON.StandardMaterial('rayMat', scene);
    rayMat.emissiveColor = hexToColor3('#00ffcc');
    rayMat.alpha = 0.4;
    rayMat.disableLighting = true;
    ray.material = rayMat; ray.parent = this.gun;
    this.aimRay = ray;

    // 左手腕面板锚点
    this.uiAnchor = new BABYLON.TransformNode('uiAnchor', scene);
    this.uiAnchor.parent = this.leftHand;
    this.uiAnchor.position.set(0.06, 0.08, 0);
    this.uiAnchor.rotation.y = -0.3;
  };

  PlayerManager.prototype.update = function(deltaTime) {
    // 射线跟随枪口通过 parent 已自动完成
  };

  return PlayerManager;
})();

// ================================================================
// UIManager
// ================================================================
var UIManager = (function() {
  function UIManager(scene, anchor) {
    this.scene = scene;
    this.anchor = anchor;
    this._build();
  }

  UIManager.prototype._build = function() {
    var scene = this.scene;
    var anchor = this.anchor;

    var panel = BABYLON.MeshBuilder.CreatePlane('wristPanel', {width:0.15,height:0.08}, scene);
    panel.parent = anchor;
    panel.position = BABYLON.Vector3.Zero();
    panel.billboardMode = BABYLON.Mesh.BILLBOARDMODE_Y | BABYLON.Mesh.BILLBOARDMODE_ALL;

    var borderMat = new BABYLON.StandardMaterial('borderMat', scene);
    borderMat.emissiveColor = hexToColor3('#00ffcc');
    borderMat.disableLighting = true;
    var edges = [
      {p:[0.075,0,0],  s:[0.002,0.08,0.002]},
      {p:[-0.075,0,0], s:[0.002,0.08,0.002]},
      {p:[0,0.04,0],   s:[0.15,0.002,0.002]},
      {p:[0,-0.04,0],  s:[0.15,0.002,0.002]},
    ];
    edges.forEach(function(e,i) {
      var b = BABYLON.MeshBuilder.CreateBox('border_'+i, {width:e.s[0],height:e.s[1],depth:e.s[2]}, scene);
      b.position.set(e.p[0],e.p[1],e.p[2]); b.parent = anchor;
      b.material = borderMat;
    });

    var ui = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(panel, 512, 256, false);

    var bg = new BABYLON.GUI.Rectangle('bg');
    bg.width = '100%'; bg.height = '100%';
    bg.background = 'rgba(0,10,20,0.7)';
    bg.thickness = 0;
    ui.addControl(bg);

    // 心形
    var heartCanvas = document.createElement('canvas');
    heartCanvas.width=24; heartCanvas.height=22;
    var hctx=heartCanvas.getContext('2d');
    hctx.fillStyle='#ff4455';
    hctx.beginPath();
    var x=heartCanvas.width/2, y=heartCanvas.height/2;
    hctx.moveTo(x, y+4);
    hctx.bezierCurveTo(x,y, x-6,y-4, x-10,y+2);
    hctx.bezierCurveTo(x-14,y+8, x-8,y+14, x,y+18);
    hctx.bezierCurveTo(x+8,y+14, x+14,y+8, x+10,y+2);
    hctx.bezierCurveTo(x+6,y-4, x,y, x,y+4);
    hctx.fill();

    var heart = new BABYLON.GUI.Image('heart', heartCanvas.toDataURL());
    heart.width='24px'; heart.height='22px';
    heart.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
    heart.verticalAlignment   = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
    heart.paddingLeft='8px'; heart.paddingTop='6px';
    ui.addControl(heart);

    this.healthText = new BABYLON.GUI.TextBlock('healthTxt','100');
    this.healthText.color='#ff4455';
    this.healthText.fontSize=20;
    this.healthText.fontFamily='Courier New, monospace';
    this.healthText.fontWeight='bold';
    this.healthText.horizontalAlignment=BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
    this.healthText.verticalAlignment=BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
    this.healthText.paddingLeft='36px'; this.healthText.paddingTop='4px';
    ui.addControl(this.healthText);

    var coin = new BABYLON.GUI.TextBlock('coinTxt','$');
    coin.color='#ffcc00'; coin.fontSize=22;
    coin.fontFamily='Courier New, monospace'; coin.fontWeight='bold';
    coin.horizontalAlignment=BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_RIGHT;
    coin.verticalAlignment=BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
    coin.paddingRight='8px'; coin.paddingTop='4px';
    ui.addControl(coin);

    this.scoreText = new BABYLON.GUI.TextBlock('scoreTxt','0');
    this.scoreText.color='#ffcc00'; this.scoreText.fontSize=20;
    this.scoreText.fontFamily='Courier New, monospace'; this.scoreText.fontWeight='bold';
    this.scoreText.horizontalAlignment=BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_RIGHT;
    this.scoreText.verticalAlignment=BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
    this.scoreText.paddingRight='38px'; this.scoreText.paddingTop='4px';
    ui.addControl(this.scoreText);

    var cdBg = new BABYLON.GUI.Ellipse('cdBg');
    cdBg.width='36px'; cdBg.height='36px';
    cdBg.color='#00ffcc'; cdBg.thickness=2;
    cdBg.background='rgba(0,30,30,0.5)';
    cdBg.horizontalAlignment=BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_CENTER;
    cdBg.verticalAlignment=BABYLON.GUI.Control.VERTICAL_ALIGNMENT_BOTTOM;
    cdBg.paddingBottom='6px';
    ui.addControl(cdBg);
    this.cooldownArc = cdBg;
  };

  UIManager.prototype.update = function(deltaTime) {};

  return UIManager;
})();

// ================================================================
// SceneManager
// ================================================================
var SceneManager = (function() {
  function SceneManager() {
    this.state = SCENE_STATE.IDLE;
    this.engine = null;
    this.scene  = null;
    this.xrHelper = null;
    this.envMgr   = null;
    this.playerMgr = null;
    this.uiMgr    = null;
    this.lastTime = performance.now();
  }

  SceneManager.prototype.init = async function() {
    addLog('Engine 初始化中...');
    var canvas = document.getElementById('renderCanvas');

    try {
      this.engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer: true, stencil: true, antialias: true,
      });
    } catch(e) {
      showDiag('[Engine 错误]\n' + e.message);
      return;
    }

    this.scene = new BABYLON.Scene(this.engine);
    this.scene.clearColor = new BABYLON.Color4(0.02, 0.03, 0.08, 1.0);
    addLog('Scene 创建完成');

    // 物理
    try {
      var cannonPlugin = new BABYLON.CannonJSPlugin(true, 10, CANNON);
      this.scene.enablePhysics(BABYLON.Vector3.Zero(), cannonPlugin);
      addLog('Cannon.js 物理启用');
    } catch(e) {
      addLog('物理引擎初始化失败: ' + e.message);
    }

    // 预览摄像机
    var cam = new BABYLON.UniversalCamera('previewCam', new BABYLON.Vector3(0,1.6,-3), this.scene);
    cam.setTarget(new BABYLON.Vector3(0,1.0,5));
    cam.attachControl(canvas, true);
    cam.minZ = 0.01;
    addLog('摄像机就绪');

    // 环境
    this.envMgr = new EnvironmentManager(this.scene);
    addLog('环境创建完成');

    // WebXR
    await this._initXR();

    // 玩家
    this.playerMgr = new PlayerManager(this.scene, this.xrHelper);
    addLog('玩家管理器就绪');

    // UI
    if (this.xrHelper && this.playerMgr) {
      this.uiMgr = new UIManager(this.scene, this.playerMgr.uiAnchor);
      addLog('UI 管理器就绪');
    }

    // 渲染循环
    var self = this;
    this.engine.runRenderLoop(function() {
      var now = performance.now();
      var dt  = Math.min((now - self.lastTime) / 1000, 0.05);
      self.lastTime = now;
      self._update(dt);
      self.scene.render();
    });
    window.addEventListener('resize', function() { self.engine.resize(); });
    addLog('渲染循环启动');
  };

  SceneManager.prototype._initXR = async function() {
    var self = this;
    var btn = document.getElementById('startBtn');

    // 按钮调试：每次点击都写日志
    btn.addEventListener('pointerdown', function() { addLog('[点击] 按钮 pointerdown 触发'); });
    btn.addEventListener('click', function() { addLog('[点击] 按钮 click 触发'); });

    btn.addEventListener('click', async function() {
      addLog('[点击] 处理开始');
      if (!self.xrHelper) {
        showDiag('[错误]\nxrHelper 未初始化\n\n请刷新页面重试');
        setStatus('[错误] xrHelper 未初始化');
        return;
      }
      var base = self.xrHelper.baseExperience;
      addLog('[DEBUG] baseExperience=' + (base ? '存在' : '不存在/null'));
      if (!base) {
        showDiag('[错误]\nbaseExperience 不存在\n\nPICO 浏览器设置中\n请开启 WebXR 实验功能');
        setStatus('[错误] baseExperience 不存在');
        return;
      }
      setStatus('检查 VR 支持...');
      var supported = false;
      try {
        // 优先使用 Babylon.js API，不存在则回退到 WebXR 原生 API
        if (typeof base.isSessionSupportedAsync === 'function') {
          supported = await base.isSessionSupportedAsync('immersive-vr');
          addLog('[DEBUG] isSessionSupported (Babylon)=' + supported);
        } else if (navigator.xr) {
          supported = await navigator.xr.isSessionSupported('immersive-vr');
          addLog('[DEBUG] isSessionSupported (WebXR)=' + supported);
        } else {
          addLog('[DEBUG] 两种 API 均不可用');
          supported = false;
        }
      } catch(e) {
        addLog('[DEBUG] 检查支持异常: ' + e.message);
        // 即使异常也尝试进入，可能是设备支持但 API 不可用
        supported = true;
      }
      if (!supported) {
        showDiag('[错误]\nimmersive-vr 不支持\n\n请在 PICO 浏览器\n设置中开启 WebXR');
        setStatus('[错误] immersive-vr 不支持');
        return;
      }
      setStatus('正在进入 VR...');
      try {
        await base.enterXRAsync('immersive-vr', 'local-floor');
        setStatus('已进入 VR!');
      } catch(e) {
        showDiag('[错误]\n进入 VR 失败:\n' + e.message);
        setStatus('[错误] 进入失败: ' + e.message);
      }
    });

    // 创建 XR 体验
    try {
      setStatus('正在初始化 WebXR...');
      addLog('调用 createDefaultXRExperienceAsync...');
      var xr = await this.scene.createDefaultXRExperienceAsync({
        floorMeshes: [],
        disableTeleportation: true,
        optionalFeatures: true,
      });
      this.xrHelper = xr;
      addLog('createDefaultXRExperienceAsync 完成');
      addLog('[DEBUG] xrHelper=' + (xr ? '存在' : 'null'));
      addLog('[DEBUG] baseExperience=' + (xr.baseExperience ? '存在' : '不存在/null'));
      addLog('[DEBUG] input=' + (xr.input ? '存在' : '不存在/null'));

      if (!xr.baseExperience) {
        showDiag('[警告]\nbaseExperience 为 undefined\n\n请在 PICO 浏览器设置中\n开启 WebXR 实验功能');
        setStatus('[警告] baseExperience 为 undefined');
        btn.textContent = 'WEBXR 未就绪';
      } else {
        setStatus('就绪 - 点击 ENTER VR 进入 (B键传送上升)');

        // 手柄绑定
        var bindController = function(source) {
          source.onMotionControllerInitObservable.addOnce(function(mc) {
            var hand = mc.handedness;
            addLog('[手柄] ' + hand + ' 已连接');
            if (self.playerMgr) {
              var root = source.grip || source.pointer;
              if (root) {
                if (hand === 'right') self.playerMgr.rightHand.parent = root;
                else if (hand === 'left')  self.playerMgr.leftHand.parent  = root;
              }
            }
            
            // B 键检测 - 传送上升
            if (hand === 'left' || hand === 'right') {
              var buttonB = mc.getComponent('b-button');
              if (buttonB) {
                buttonB.onButtonStateChangedObservable.add(function(component) {
                  if (component.pressed) {
                    addLog('[B键] 按下 - 尝试传送上升');
                    if (self.envMgr) {
                      var currentFloor = self.envMgr.getCurrentFloor();
                      var targetFloor = currentFloor + 1;
                      if (targetFloor <= self.envMgr.totalFloors) {
                        // 传送玩家到新楼层
                        var targetY = self.envMgr.teleportToFloor(targetFloor);
                        if (targetY !== false) {
                          // 移动 XR 相机
                          if (xr.baseExperience.camera) {
                            xr.baseExperience.camera.position.y = targetY;
                            addLog('[传送] 玩家已移动到第 ' + targetFloor + ' 层');
                            setStatus('第 ' + targetFloor + ' 层 / 8');
                          }
                        }
                      } else {
                        addLog('[B键] 已在顶层');
                        setStatus('已在第 8 层（顶层）');
                      }
                    }
                  }
                });
                addLog('[手柄] B键组件已绑定');
              } else {
                // 备选：使用 X button
                var buttonX = mc.getComponent('x-button');
                if (buttonX) {
                  buttonX.onButtonStateChangedObservable.add(function(component) {
                    if (component.pressed) {
                      addLog('[X键] 按下 - 尝试传送上升');
                      if (self.envMgr) {
                        var currentFloor = self.envMgr.getCurrentFloor();
                        var targetFloor = currentFloor + 1;
                        if (targetFloor <= self.envMgr.totalFloors) {
                          var targetY = self.envMgr.teleportToFloor(targetFloor);
                          if (targetY !== false && xr.baseExperience.camera) {
                            xr.baseExperience.camera.position.y = targetY;
                            addLog('[传送] 玩家已移动到第 ' + targetFloor + ' 层');
                            setStatus('第 ' + targetFloor + ' 层 / 8');
                          }
                        } else {
                          addLog('[X键] 已在顶层');
                          setStatus('已在第 8 层（顶层）');
                        }
                      }
                    }
                  });
                  addLog('[手柄] X键（备选）组件已绑定');
                }
              }
            }
          });
        };
        xr.input.onControllerAddedObservable.add(bindController);
        xr.input.controllers.forEach(bindController);
        xr.input.onControllerRemovedObservable.add(function() {
          addLog('[手柄] 已断开');
        });

        // XR 状态变化
        xr.baseExperience.onStateChangedObservable.add(function(state) {
          if (state === BABYLON.WebXRState.IN_XR) {
            setStatus('第 1 层 / 8  - 按 B 键传送上升');
            document.getElementById('overlay').style.display = 'none';
          } else if (state === BABYLON.WebXRState.NOT_IN_XR) {
            setStatus('已退出 VR');
            document.getElementById('overlay').style.display = 'flex';
          }
        });
      }
    } catch(e) {
      showDiag('[错误]\nWebXR 初始化失败:\n' + e.message);
      setStatus('[错误] WebXR 不可用');
      btn.textContent = 'WEBXR 不可用';
      btn.disabled = true;
    }
  };

  SceneManager.prototype._update = function(dt) {
    if (this.envMgr)   this.envMgr.update(dt);
    if (this.playerMgr) this.playerMgr.update(dt);
    if (this.uiMgr)    this.uiMgr.update(dt);
  };

  SceneManager.prototype.setState = function(newState) {
    var prev = this.state;
    this.state = newState;
    addLog('[状态机] ' + prev + ' -> ' + newState);
    if (newState === SCENE_STATE.STATIC_DEMO && this.envMgr) {
      // 石头塔不需要发光效果，预留接口
      // this.envMgr.setTowerGlow('#00ff00', 0.8);
    }
  };

  return SceneManager;
})();

// ================================================================
// Main Entry
// ================================================================
window.addEventListener('DOMContentLoaded', async function() {
  addLog('页面加载完成');

  if (typeof BABYLON === 'undefined') {
    showDiag('[致命错误]\nBabylon.js 未加载!\n\n可能原因:\n1. CDN 无法访问\n2. 网络被屏蔽\n\n请确认 PICO 浏览器\n可以访问外网');
    return;
  }
  addLog('Babylon.js 已加载, 版本: ' + (BABYLON.Engine.Version || 'unknown'));

  var mgr = new SceneManager();
  window._mgr = mgr;

  try {
    await mgr.init();
    mgr.setState(SCENE_STATE.STATIC_DEMO);
    addLog('SceneManager 初始化完成');
    setStatus('就绪 - 点击 ENTER VR 进入');
  } catch(e) {
    showDiag('[致命错误]\n初始化失败:\n' + e.message);
  }
});

// 全局调试接口
window._testSetColor = function(hex) {
  if (window._mgr && window._mgr.envMgr) {
    window._mgr.envMgr.setTowerGlow(hex, 1.0);
    addLog('测试变色: ' + hex);
  }
};
</script>
